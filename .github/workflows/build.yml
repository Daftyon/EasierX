name: Build BatcherMan Desktop

on:
  push:
    branches: [ master, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.11']
        include:
          - os: windows-latest
            output_name: BatcherMan-Windows.exe
            artifact_name: BatcherMan-Windows
          - os: ubuntu-latest
            output_name: BatcherMan-Linux
            artifact_name: BatcherMan-Linux
          - os: macos-latest
            output_name: BatcherMan-macOS.app
            artifact_name: BatcherMan-macOS

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Java (for JPype)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Linux dependencies (Ubuntu only)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --name=BatcherMan `
          --onefile `
          --windowed `
          --icon=resources/icon.ico `
          --add-data "resources;resources" `
          --add-data "core;core" `
          --hidden-import=jpype `
          --hidden-import=jpype._jvmfinder `
          --hidden-import=tkinter `
          --hidden-import=xml.etree.ElementTree `
          main_tkinter.py

    - name: Build with PyInstaller (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller --name=BatcherMan \
          --onefile \
          --windowed \
          --add-data "resources:resources" \
          --add-data "core:core" \
          --hidden-import=jpype \
          --hidden-import=jpype._jvmfinder \
          --hidden-import=tkinter \
          --hidden-import=xml.etree.ElementTree \
          main_tkinter.py

    - name: Build with PyInstaller (macOS)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --name=BatcherMan \
          --onefile \
          --windowed \
          --icon=resources/icon.icns \
          --add-data "resources:resources" \
          --add-data "core:core" \
          --hidden-import=jpype \
          --hidden-import=jpype._jvmfinder \
          --hidden-import=tkinter \
          --hidden-import=xml.etree.ElementTree \
          --osx-bundle-identifier=com.synthos.batcherman \
          main_tkinter.py

    - name: Create distributable package (Windows)
      if: runner.os == 'Windows'
      run: |
        mkdir dist/BatcherMan-Windows
        copy dist/BatcherMan.exe dist/BatcherMan-Windows/
        echo "# BatcherMan Desktop" > dist/BatcherMan-Windows/README.txt
        echo "Spring Batch Testing & Debugging Tool" >> dist/BatcherMan-Windows/README.txt
        echo "" >> dist/BatcherMan-Windows/README.txt
        echo "Run BatcherMan.exe to start the application" >> dist/BatcherMan-Windows/README.txt
        Compress-Archive -Path dist/BatcherMan-Windows -DestinationPath dist/BatcherMan-Windows.zip

    - name: Create distributable package (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p dist/BatcherMan-Linux
        cp dist/BatcherMan dist/BatcherMan-Linux/
        chmod +x dist/BatcherMan-Linux/BatcherMan
        cat > dist/BatcherMan-Linux/README.txt << EOF
        # BatcherMan Desktop
        Spring Batch Testing & Debugging Tool
        
        Run: ./BatcherMan
        
        Note: Requires Java 17+ to be installed
        EOF
        cd dist && tar -czf BatcherMan-Linux.tar.gz BatcherMan-Linux/

    - name: Create distributable package (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p dist/BatcherMan-macOS
        cp -r dist/BatcherMan.app dist/BatcherMan-macOS/
        cat > dist/BatcherMan-macOS/README.txt << EOF
        # BatcherMan Desktop
        Spring Batch Testing & Debugging Tool
        
        Double-click BatcherMan.app to start
        
        Note: Requires Java 17+ to be installed
        If macOS blocks the app, go to System Preferences > Security & Privacy
        EOF
        cd dist && zip -r BatcherMan-macOS.zip BatcherMan-macOS/

    - name: Upload artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/BatcherMan-Windows.zip
        retention-days: 30

    - name: Upload artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/BatcherMan-Linux.tar.gz
        retention-days: 30

    - name: Upload artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/BatcherMan-macOS.zip
        retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/BatcherMan-Windows/BatcherMan-Windows.zip
          artifacts/BatcherMan-Linux/BatcherMan-Linux.tar.gz
          artifacts/BatcherMan-macOS/BatcherMan-macOS.zip
        body: |
          ## 🚀 BatcherMan Desktop Release
          
          ### Downloads
          - **Windows**: BatcherMan-Windows.zip
          - **Linux**: BatcherMan-Linux.tar.gz
          - **macOS**: BatcherMan-macOS.zip
          
          ### Requirements
          - Java 17+ installed
          - Spring Batch JAR file to analyze
          
          ### Quick Start
          1. Download the package for your OS
          2. Extract the archive
          3. Run the executable
          4. Browse to your Spring Batch JAR
          5. Click Analyze and start testing!
          
          ### What's New
          - 📖 Reader testing in isolation
          - ⚙️ Processor debugging with diff view
          - ✍️ Writer validation
          - 🔄 Step execution with flow visualization
          - 🚀 Complete job runner with progress tracking
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.event.release.tag_name }}...HEAD
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
